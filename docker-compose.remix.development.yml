services:
  cyberstorm-remix-nginx-conf:
    image: alpine:3.20
    container_name: cyberstorm-remix-nginx-conf
    restart: "no"
    command: >-
      /bin/sh -c "set -e; cp /src/new-localhost.conf /etc/nginx/user-conf/new-localhost.conf"
    volumes:
      - ./tools/nginx/new-localhost.conf:/src/new-localhost.conf:ro
      - thunderstore_nginx_conf:/etc/nginx/user-conf

  cyberstorm-remix-sync:
    image: alpine:3.20
    container_name: cyberstorm-remix-sync
    restart: "no"
    command: >-
      /bin/sh -c "set -e; apk add --no-cache rsync; rsync -a --delete --info=progress2 --exclude='.git' --exclude='build-secrets' --exclude='.npmrc' --exclude='node_modules' --exclude='.turbo' --exclude='.cache' /src/ /workspace/; echo sync complete"
    volumes:
      - ./:/src:ro
      - workspace_src:/workspace

  cyberstorm-remix-watch:
    image: alpine:3.20
    container_name: cyberstorm-remix-watch
    restart: unless-stopped
    environment:
      - SYNC_INTERVAL=5
    command: >-
      /bin/sh -c "set -e; apk add --no-cache rsync; while true; do rsync -a --delete --info=progress2 --exclude='.git' --exclude='build-secrets' --exclude='.npmrc' --exclude='node_modules' --exclude='.turbo' --exclude='.cache' /src/ /workspace/; sleep ${SYNC_INTERVAL}; done"
    volumes:
      - ./:/src:ro
      - workspace_src:/workspace

  cyberstorm-remix:
    container_name: cyberstorm-remix
    build:
      context: ./
      dockerfile: ./Dockerfile.dev
    working_dir: /workspace
    ports:
      - "3000:3000"
    depends_on:
      cyberstorm-remix-nginx-conf:
        condition: service_completed_successfully
      cyberstorm-remix-sync:
        condition: service_completed_successfully
    volumes:
      - workspace_src:/workspace
      - thunderstore_ui_node_modules:/workspace/node_modules
      - nimbus_node_modules:/workspace/apps/cyberstorm-remix/node_modules
      - thunderstore_nginx_conf:/etc/nginx/user-conf
      - yarn_cache:/usr/local/share/.cache/yarn
    networks:
        - thunderstore_default
    environment:
      - NODE_ENV=development
      - NPM_CONFIG_USERCONFIG=/run/secrets/npmrc
      - ENABLE_BROKEN_PAGES=True
      - VITE_DEVELOPMENT=True
      - VITE_SITE_URL=http://localhost
      - VITE_BETA_SITE_URL=http://new.localhost
      - VITE_API_URL=http://localhost
      - VITE_COOKIE_DOMAIN=.localhost
      - VITE_AUTH_BASE_URL=http://localhost
      - VITE_AUTH_RETURN_URL=http://new.localhost
      - __VITE_ADDITIONAL_SERVER_ALLOWED_HOSTS=.localhost
    secrets:
      - npmrc

volumes:
  workspace_src:
  thunderstore_ui_node_modules:
  nimbus_node_modules:
  yarn_cache:
  thunderstore_nginx_conf:
    external: true

secrets:
  npmrc:
    file: "./build-secrets/.npmrc"

networks:
  thunderstore_default:
    name: thunderstore_default
    external: true
